version: '3.9'

services:
  web:
    build: .
    container_name: iwli-website
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      # Optional: Mount for SSL certificates
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - iwli-network

networks:
  iwli-network:
    driver: bridge
