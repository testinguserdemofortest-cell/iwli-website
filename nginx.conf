# Nginx Configuration for IWLI Website
# Use this in /etc/nginx/sites-available/iwli.conf

server {
    listen 80;
    listen [::]:80;
    server_name iwli.ai www.iwli.ai;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iwli.ai www.iwli.ai;
    
    # SSL Configuration (use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/iwli.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iwli.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Root directory
    root /var/www/iwli.ai;
    index index.html index.htm;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/xml+rss application/rss+xml application/atom+xml 
               application/javascript application/x-javascript application/json;
    gzip_disable "msie6";
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Cache HTML files for shorter period
    location ~* \.html$ {
        expires 1d;
        add_header Cache-Control "public";
    }
    
    # Main location
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/iwli.ai_access.log combined;
    error_log /var/log/nginx/iwli.ai_error.log warn;
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.iwli.ai;
    
    ssl_certificate /etc/letsencrypt/live/iwli.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iwli.ai/privkey.pem;
    
    return 301 https://iwli.ai$request_uri;
}
